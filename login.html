<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-sm">
  <!-- Logo -->
  <a href="index.html" class="flex items-center justify-center gap-3 mb-10 group">
    <img src="docs/img/danichaplogo-transparent.png" alt="DANICHAP" width="36" height="36" class="amber-glow-sm rounded-sm object-contain" style="width:36px;height:36px;"/>
    <div class="leading-none">
      <span class="block font-headline font-black text-xl uppercase tracking-tight text-on-surface">DANICHAP</span>
      <span class="block text-[9px] font-bold tracking-[0.2em] uppercase font-label text-primary-container">REPUESTOS · LONGCHAMPS</span>
    </div>
  </a>

  <!-- Card -->
  <div class="bg-surface border border-outline-variant rounded-2xl shadow-sm p-8">
    <!-- Tabs -->
    <div class="flex gap-1 mb-7 bg-surface-container rounded-xl p-1">
      <button id="tab-login"    class="flex-1 py-2 rounded-lg text-sm font-bold font-headline uppercase tracking-wide transition-all bg-surface shadow text-on-surface">Ingresar</button>
      <button id="tab-register" class="flex-1 py-2 rounded-lg text-sm font-bold font-headline uppercase tracking-wide transition-all text-secondary">Registrarse</button>
    </div>

    <!-- Login form -->
    <form id="form-login" class="space-y-4">
      <div>
        <label class="block text-xs font-bold uppercase tracking-wide text-secondary mb-1.5">Email</label>
        <input type="email" name="email" required autofocus autocomplete="email"
          class="w-full bg-surface-container-low border border-outline-variant rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary-container transition-colors"/>
      </div>
      <div>
        <label class="block text-xs font-bold uppercase tracking-wide text-secondary mb-1.5">Contraseña</label>
        <input type="password" name="password" required autocomplete="current-password"
          class="w-full bg-surface-container-low border border-outline-variant rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary-container transition-colors"/>
      </div>
      <p id="login-error" class="text-error text-xs hidden font-body"></p>
      <button type="submit"
        class="w-full bg-primary-container text-white py-3 rounded-xl font-bold font-headline uppercase text-sm hover:opacity-90 transition-opacity">
        Entrar
      </button>
    </form>

    <!-- Register form -->
    <form id="form-register" class="space-y-4 hidden">
      <div>
        <label class="block text-xs font-bold uppercase tracking-wide text-secondary mb-1.5">Nombre</label>
        <input type="text" name="nombre" required autocomplete="name"
          class="w-full bg-surface-container-low border border-outline-variant rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary-container transition-colors"/>
      </div>
      <div>
        <label class="block text-xs font-bold uppercase tracking-wide text-secondary mb-1.5">Email</label>
        <input type="email" name="email" required autocomplete="email"
          class="w-full bg-surface-container-low border border-outline-variant rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary-container transition-colors"/>
      </div>
      <div>
        <label class="block text-xs font-bold uppercase tracking-wide text-secondary mb-1.5">Contraseña</label>
        <input type="password" name="password" required minlength="6" autocomplete="new-password"
          class="w-full bg-surface-container-low border border-outline-variant rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary-container transition-colors"/>
      </div>
      <p id="register-error"   class="text-error   text-xs hidden font-body"></p>
      <p id="register-success" class="text-tertiary text-xs hidden font-body">¡Cuenta creada! Revisá tu email para confirmar.</p>
      <button type="submit"
        class="w-full bg-primary-container text-white py-3 rounded-xl font-bold font-headline uppercase text-sm hover:opacity-90 transition-opacity">
        Crear cuenta
      </button>
    </form>
  </div>

  <p class="text-center text-secondary text-xs font-body mt-6">
    <a href="index.html" class="hover:text-on-surface transition-colors">← Volver al sitio</a>
  </p>
</div>

<script>
  // Tab switching
  document.getElementById('tab-login').addEventListener('click', () => switchTab('login'));
  document.getElementById('tab-register').addEventListener('click', () => switchTab('register'));

  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('form-login').classList.toggle('hidden', !isLogin);
    document.getElementById('form-register').classList.toggle('hidden', isLogin);
    const base = 'flex-1 py-2 rounded-lg text-sm font-bold font-headline uppercase tracking-wide transition-all';
    document.getElementById('tab-login').className    = `${base} ${isLogin  ? 'bg-surface shadow text-on-surface' : 'text-secondary'}`;
    document.getElementById('tab-register').className = `${base} ${!isLogin ? 'bg-surface shadow text-on-surface' : 'text-secondary'}`;
  }

  // Login
  document.getElementById('form-login').addEventListener('submit', async e => {
    e.preventDefault();
    const fd    = new FormData(e.target);
    const errEl = document.getElementById('login-error');
    const btn   = e.target.querySelector('button[type=submit]');
    errEl.classList.add('hidden');
    btn.textContent = 'Entrando…'; btn.disabled = true;
    const { error } = await Auth.signIn(fd.get('email'), fd.get('password'));
    if (error) {
      errEl.textContent = 'Email o contraseña incorrectos.';
      errEl.classList.remove('hidden');
      btn.textContent = 'Entrar'; btn.disabled = false;
      return;
    }
    // Redirigir según rol
    const user    = await Auth.getUser();
    const perfil  = await Perfiles.get(user.id);
    window.location.href = perfil?.rol === 'admin' ? 'admin.html' : 'index.html';
  });

  // Register
  document.getElementById('form-register').addEventListener('submit', async e => {
    e.preventDefault();
    const fd    = new FormData(e.target);
    const errEl = document.getElementById('register-error');
    const okEl  = document.getElementById('register-success');
    const btn   = e.target.querySelector('button[type=submit]');
    errEl.classList.add('hidden'); okEl.classList.add('hidden');
    btn.textContent = 'Creando…'; btn.disabled = true;
    const { error } = await Auth.signUp(fd.get('email'), fd.get('password'), fd.get('nombre'));
    btn.textContent = 'Crear cuenta'; btn.disabled = false;
    if (error) {
      errEl.textContent = error.message;
      errEl.classList.remove('hidden');
      return;
    }
    okEl.classList.remove('hidden');
    e.target.reset();
  });

  // Si ya está logueado, redirigir
  Auth.getUser().then(async user => {
    if (!user) return;
    const perfil = await Perfiles.get(user.id);
    window.location.href = perfil?.rol === 'admin' ? 'admin.html' : 'index.html';
  });
</script>
</body>
</html>
